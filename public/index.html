<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Max Usage Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .header {
      padding: 14px 32px;
      border-bottom: 1px solid #1e1e2e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 18px; font-weight: 600; color: #fff; }
    .header .tier {
      font-size: 12px;
      background: #d97706;
      color: #000;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
    }
    .controls {
      padding: 10px 32px;
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .controls button {
      padding: 5px 14px;
      border: 1px solid #2a2a3e;
      background: #1a1a2e;
      color: #ccc;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }
    .controls button:hover { background: #252540; }
    .controls button.active { background: #d97706; color: #000; border-color: #d97706; font-weight: 600; }
    .controls .refresh-btn {
      margin-left: auto;
      background: #1e3a2f;
      border-color: #2d5a42;
      color: #4ade80;
    }
    .controls .refresh-btn:hover { background: #254a3a; }
    .dashboard {
      padding: 12px 32px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .card {
      background: #16161e;
      border: 1px solid #1e1e2e;
      border-radius: 10px;
      padding: 16px;
    }
    .card.full { grid-column: 1 / -1; }
    .card h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 12px;
    }
    .top-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }
    .gauge-row {
      display: flex;
      gap: 24px;
      justify-content: center;
      align-items: center;
    }
    .gauge { text-align: center; }
    .gauge-circle {
      position: relative;
      width: 100px;
      height: 100px;
    }
    .gauge-circle svg { transform: rotate(-90deg); width: 100%; height: 100%; }
    .gauge-circle .value {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
    }
    .gauge-label { margin-top: 4px; font-size: 12px; color: #aaa; }
    .gauge-reset { font-size: 11px; color: #666; margin-top: 2px; }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .stat { text-align: center; }
    .stat .val { font-size: 20px; font-weight: 700; color: #fff; }
    .stat .lbl { font-size: 11px; color: #888; margin-top: 2px; }
    .chart-container {
      position: relative;
      height: 240px;
    }
    .last-update {
      font-size: 11px;
      color: #555;
      text-align: center;
      padding: 10px;
    }
    @media (max-width: 1024px) {
      .top-row { grid-template-columns: 1fr 1fr !important; }
      .top-row > :last-child { grid-column: 1 / -1; }
    }
    @media (max-width: 768px) {
      .dashboard { grid-template-columns: 1fr; padding: 8px; }
      .top-row { grid-template-columns: 1fr !important; }
      .top-row > :last-child { grid-column: auto; }
      .header { padding: 12px; }
      .header h1 { font-size: 15px; }
      .controls { padding: 8px; flex-wrap: wrap; }
      .controls button { padding: 5px 10px; font-size: 11px; }
      .gauge-row { gap: 12px; }
      .gauge-circle { width: 76px; height: 76px; }
      .gauge-circle .value { font-size: 15px; }
      .gauge-label { font-size: 10px; }
      .stat-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat .val { font-size: 16px; }
      .chart-container { height: 200px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Claude Max Usage Monitor</h1>
    <span class="tier" id="tier">--</span>
  </div>

  <div class="controls">
    <button class="active" data-hours="6">6h</button>
    <button data-hours="12">12h</button>
    <button data-hours="24">24h</button>
    <button data-hours="72">3d</button>
    <button data-hours="168">7d</button>
    <button class="refresh-btn" id="refreshBtn">Refresh now</button>
  </div>

  <div class="dashboard">
    <!-- Top row: gauges + extra usage side by side -->
    <div class="top-row" style="grid-column: 1 / -1;">
      <div class="card">
        <h2>Current usage</h2>
        <div class="gauge-row">
          <div class="gauge">
            <div class="gauge-circle" id="gauge5h">
              <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="42" fill="none" stroke="#1e1e2e" stroke-width="8"/>
                <circle cx="50" cy="50" r="42" fill="none" stroke="#d97706" stroke-width="8"
                  stroke-dasharray="264" stroke-dashoffset="264" stroke-linecap="round" class="progress"/>
              </svg>
              <div class="value">--%</div>
            </div>
            <div class="gauge-label">5-hour window</div>
            <div class="gauge-reset" id="reset5h"></div>
          </div>
          <div class="gauge">
            <div class="gauge-circle" id="gauge7d">
              <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="42" fill="none" stroke="#1e1e2e" stroke-width="8"/>
                <circle cx="50" cy="50" r="42" fill="none" stroke="#6366f1" stroke-width="8"
                  stroke-dasharray="264" stroke-dashoffset="264" stroke-linecap="round" class="progress"/>
              </svg>
              <div class="value">--%</div>
            </div>
            <div class="gauge-label">7-day window</div>
            <div class="gauge-reset" id="reset7d"></div>
          </div>
        </div>
      </div>
      <div class="card">
        <h2>Extra credits</h2>
        <div style="text-align:center;margin-bottom:8px;">
          <div style="font-size:28px;font-weight:700;" id="extraVal">--</div>
          <div style="font-size:12px;color:#888;margin-top:4px;" id="extraDetail">--</div>
          <div style="margin-top:10px;background:#1e1e2e;border-radius:8px;height:12px;overflow:hidden;">
            <div id="extraBar" style="height:100%;background:#8b5cf6;border-radius:8px;width:0%;transition:width 0.5s;"></div>
          </div>
        </div>
      </div>
      <div class="card">
        <h2>Stats (selected period)</h2>
        <div class="stat-grid">
          <div class="stat"><div class="val" id="avgFive">--</div><div class="lbl">Avg 5h</div></div>
          <div class="stat"><div class="val" id="maxFive">--</div><div class="lbl">Max 5h</div></div>
          <div class="stat"><div class="val" id="minFive">--</div><div class="lbl">Min 5h</div></div>
          <div class="stat"><div class="val" id="avgSeven">--</div><div class="lbl">Avg 7d</div></div>
          <div class="stat"><div class="val" id="maxSeven">--</div><div class="lbl">Max 7d</div></div>
          <div class="stat"><div class="val" id="snapCount">--</div><div class="lbl">Snapshots</div></div>
        </div>
      </div>
    </div>

    <!-- Charts row: 5h + extra credits side by side -->
    <div class="card">
      <h2>5-hour history</h2>
      <div class="chart-container">
        <canvas id="chart5h"></canvas>
      </div>
    </div>

    <div class="card">
      <h2>Extra credits history</h2>
      <div class="chart-container">
        <canvas id="chartCredits"></canvas>
      </div>
    </div>

    <!-- 7d chart full width -->
    <div class="card full">
      <h2>7-day history</h2>
      <div class="chart-container">
        <canvas id="chart7d"></canvas>
      </div>
    </div>
  </div>

  <div class="last-update">Last update: <span id="lastUpdate">--</span></div>

  <script>
    const CIRC = 2 * Math.PI * 42; // 264
    let currentHours = 6;
    let chart5h, chart7d;

    function gaugeColor(pct) {
      if (pct < 50) return "#4ade80";
      if (pct < 80) return "#d97706";
      return "#ef4444";
    }

    function updateGauge(id, pct) {
      const el = document.getElementById(id);
      const circle = el.querySelector(".progress");
      const valEl = el.querySelector(".value");
      const p = Math.max(0, Math.min(100, pct || 0));
      const offset = CIRC - (CIRC * p) / 100;
      circle.style.strokeDashoffset = offset;
      circle.style.stroke = gaugeColor(p);
      valEl.textContent = p.toFixed(1) + "%";
      valEl.style.color = gaugeColor(p);
    }

    function timeAgo(isoStr) {
      if (!isoStr) return "";
      const d = new Date(isoStr);
      const diff = d - Date.now();
      if (diff <= 0) return "now";
      const mins = Math.floor(diff / 60000);
      if (mins < 60) return `resets in ${mins}min`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `resets in ${hrs}h${mins % 60}min`;
      return `resets in ${Math.floor(hrs / 24)}d`;
    }

    function makeChart(canvasId, label, color) {
      const ctx = document.getElementById(canvasId).getContext("2d");
      return new Chart(ctx, {
        type: "line",
        data: {
          datasets: [{
            label,
            data: [],
            borderColor: color,
            backgroundColor: color + "22",
            fill: true,
            tension: 0.3,
            pointRadius: 1.5,
            borderWidth: 2,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { intersect: false, mode: "index" },
          scales: {
            x: {
              type: "time",
              time: { tooltipFormat: "dd/MM HH:mm" },
              grid: { color: "#1e1e2e" },
              ticks: { color: "#666", maxTicksLimit: 8 },
            },
            y: {
              min: 0,
              max: 100,
              grid: { color: "#1e1e2e" },
              ticks: { color: "#666", callback: v => v + "%" },
            },
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}%`,
              },
            },
          },
        },
      });
    }

    function makeCreditsChart(canvasId) {
      const ctx = document.getElementById(canvasId).getContext("2d");
      return new Chart(ctx, {
        type: "line",
        data: {
          datasets: [
            {
              label: "Credits used",
              data: [],
              borderColor: "#8b5cf6",
              backgroundColor: "#8b5cf622",
              fill: true,
              tension: 0.3,
              pointRadius: 1.5,
              borderWidth: 2,
              yAxisID: "y",
            },
            {
              label: "Monthly limit",
              data: [],
              borderColor: "#ef444488",
              borderDash: [6, 4],
              pointRadius: 0,
              borderWidth: 1.5,
              fill: false,
              yAxisID: "y",
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { intersect: false, mode: "index" },
          scales: {
            x: {
              type: "time",
              time: { tooltipFormat: "dd/MM HH:mm" },
              grid: { color: "#1e1e2e" },
              ticks: { color: "#666", maxTicksLimit: 8 },
            },
            y: {
              min: 0,
              grid: { color: "#1e1e2e" },
              ticks: { color: "#666", callback: v => v.toFixed(0) + "\u20AC" },
            },
          },
          plugins: {
            legend: { labels: { color: "#888", boxWidth: 10, font: { size: 11 } } },
            tooltip: {
              callbacks: {
                label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)}\u20AC`,
              },
            },
          },
        },
      });
    }

    function make7dChart(canvasId) {
      const ctx = document.getElementById(canvasId).getContext("2d");
      return new Chart(ctx, {
        type: "line",
        data: {
          datasets: [
            {
              label: "7d usage",
              data: [],
              borderColor: "#6366f1",
              backgroundColor: "#6366f122",
              fill: true,
              tension: 0.3,
              pointRadius: 1.5,
              borderWidth: 2,
            },
            {
              label: "Ideal pace",
              data: [],
              borderColor: "#4ade8088",
              borderDash: [6, 4],
              pointRadius: 0,
              borderWidth: 1.5,
              fill: false,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { intersect: false, mode: "index" },
          scales: {
            x: {
              type: "time",
              time: { tooltipFormat: "dd/MM HH:mm" },
              grid: { color: "#1e1e2e" },
              ticks: { color: "#666", maxTicksLimit: 8 },
            },
            y: {
              min: 0,
              max: 100,
              grid: { color: "#1e1e2e" },
              ticks: { color: "#666", callback: v => v + "%" },
            },
          },
          plugins: {
            legend: { labels: { color: "#888", boxWidth: 10, font: { size: 11 } } },
            tooltip: {
              callbacks: {
                label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}%`,
              },
            },
          },
        },
      });
    }

    // Init
    chart5h = makeChart("chart5h", "5h usage", "#d97706");
    chart7d = make7dChart("chart7d");
    let chartCredits = makeCreditsChart("chartCredits");

    async function refresh() {
      const res = await fetch(`/api/snapshots?hours=${currentHours}`);
      const rows = await res.json();

      if (rows.length === 0) return;

      const latest = rows[rows.length - 1];

      // Gauges
      updateGauge("gauge5h", latest.five_hour_pct);
      updateGauge("gauge7d", latest.seven_day_pct);
      document.getElementById("reset5h").textContent = timeAgo(latest.five_hour_resets_at);
      document.getElementById("reset7d").textContent = timeAgo(latest.seven_day_resets_at);
      document.getElementById("tier").textContent = latest.rate_limit_tier || "--";

      // Extra usage
      if (latest.extra_utilization != null) {
        const pct = latest.extra_utilization;
        document.getElementById("extraVal").textContent = pct.toFixed(1) + "%";
        document.getElementById("extraVal").style.color = gaugeColor(pct);
        document.getElementById("extraDetail").textContent = `${((latest.extra_used_credits || 0) / 100).toFixed(2)}\u20AC / ${((latest.extra_monthly_limit || 0) / 100).toFixed(0)}\u20AC`;
        document.getElementById("extraBar").style.width = Math.min(100, pct) + "%";
        document.getElementById("extraBar").style.background = gaugeColor(pct);
      }

      // Stats
      const fives = rows.map(r => r.five_hour_pct).filter(v => v != null);
      const sevens = rows.map(r => r.seven_day_pct).filter(v => v != null);
      const avg = arr => arr.length ? (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(1) + "%" : "--";
      const max = arr => arr.length ? Math.max(...arr).toFixed(1) + "%" : "--";
      const min = arr => arr.length ? Math.min(...arr).toFixed(1) + "%" : "--";

      document.getElementById("avgFive").textContent = avg(fives);
      document.getElementById("maxFive").textContent = max(fives);
      document.getElementById("minFive").textContent = min(fives);
      document.getElementById("avgSeven").textContent = avg(sevens);
      document.getElementById("maxSeven").textContent = max(sevens);
      document.getElementById("snapCount").textContent = rows.length;

      // Charts
      const data5h = rows.map(r => ({ x: new Date(r.timestamp + "Z"), y: r.five_hour_pct }));
      const data7d = rows.map(r => ({ x: new Date(r.timestamp + "Z"), y: r.seven_day_pct }));

      chart5h.data.datasets[0].data = data5h;
      chart5h.update("none");
      chart7d.data.datasets[0].data = data7d;

      // Ideal pace line: linear from 0% to 100% within each rolling 7-day window.
      // Computed per snapshot so it naturally drops back at each reset.
      const WEEK_MS = 7 * 24 * 60 * 60 * 1000;
      const pace = rows
        .filter(r => r.seven_day_resets_at)
        .map(r => {
          const t = new Date(r.timestamp + "Z").getTime();
          const resetTs = new Date(r.seven_day_resets_at).getTime();
          const startTs = resetTs - WEEK_MS;
          const pct = Math.max(0, Math.min(100, ((t - startTs) / WEEK_MS) * 100));
          return { x: new Date(r.timestamp + "Z"), y: pct };
        });
      chart7d.data.datasets[1].data = pace;
      chart7d.update("none");

      // Credits chart
      const dataCreditsUsed = rows
        .filter(r => r.extra_used_credits != null)
        .map(r => ({ x: new Date(r.timestamp + "Z"), y: r.extra_used_credits / 100 }));
      const dataCreditsLimit = rows
        .filter(r => r.extra_monthly_limit != null)
        .map(r => ({ x: new Date(r.timestamp + "Z"), y: r.extra_monthly_limit / 100 }));
      chartCredits.data.datasets[0].data = dataCreditsUsed;
      chartCredits.data.datasets[1].data = dataCreditsLimit;
      chartCredits.update("none");

      document.getElementById("lastUpdate").textContent = new Date().toLocaleString();
    }

    // Period buttons
    document.querySelectorAll("[data-hours]").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("[data-hours]").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentHours = parseInt(btn.dataset.hours);
        refresh();
      });
    });

    // Manual refresh
    document.getElementById("refreshBtn").addEventListener("click", async () => {
      const btn = document.getElementById("refreshBtn");
      btn.textContent = "...";
      btn.disabled = true;
      await fetch("/api/snapshot", { method: "POST" });
      await refresh();
      btn.textContent = "Refresh now";
      btn.disabled = false;
    });

    // Auto-refresh every 5 minutes
    refresh();
    setInterval(refresh, 5 * 60 * 1000);
  </script>
</body>
</html>
